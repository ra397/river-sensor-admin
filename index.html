<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <title>RiverSensor Admin</title>
  </head>
  <body>
    <div id="login-container">
      <form id="login-form">
          <h2>Login</h2>
          <label for="login-email"></label><input type="email" id="login-email" placeholder="Email" required />
          <label for="login-password"></label><input type="password" id="login-password" placeholder="Password" required />
          <button type="submit" class="btn submit-btn login-btn">Login</button>
          <span id="forgot-password-link" class="link">Forgot password?</span>
      </form>
    </div>

    <div id="forgot-password-container">
      <div id="forgot-password-form">
          <h2>Reset Password</h2>
          <label for="forgot-email"></label><input type="email" id="forgot-email" placeholder="Email" required />
          <button type="button" id="get-otp-btn" class="btn submit-btn login-btn">Get One-Time Code</button>
          <span class="link back-to-login">Back to login</span>
      </div>
    </div>

    <div id="new-password-container">
      <div id="new-password-form">
          <h2>Reset Password</h2>
          <label for="reset-email"></label><input type="email" id="reset-email" placeholder="Email" autocomplete="off" required />
          <label for="reset-otp"></label><input type="text" id="reset-otp" placeholder="One-Time Code" autocomplete="one-time-code" required />
          <label for="reset-password"></label><input type="password" id="reset-password" placeholder="New Password" autocomplete="new-password" required />
          <label for="reset-password-confirm"></label><input type="password" id="reset-password-confirm" placeholder="Confirm New Password" autocomplete="new-password" required />
          <button type="button" id="reset-password-btn" class="btn submit-btn login-btn">Reset Password</button>
          <span class="link back-to-login">Back to login</span>
      </div>
    </div>

    <div id="main">
        <nav id="navbar">
            <button id="nav-action-btn" class="btn open-btn"></button>
            <div class="nav-tabs"></div>
            <div class="nav-right">
                <span id="user-name"></span>
                <button id="logout-btn" class="btn close-btn">Logout</button>
            </div>
        </nav>

        <div id="app-body">
            <div id="sidebar">
                <div class="sidebar-section">
                    <label for="search-input"></label>
                    <input type="search" id="search-input" placeholder="Search...">
                </div>

                <div class="sidebar-section">
                    <label class="sidebar-heading">Filters</label>
                    <div id="filter-groups"></div>
                </div>
            </div>

            <div id="table-container">
                <div id="column-toggle-container"></div>
                <div id="table"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="observatory">
        <div class="modal-card">
            <div class="modal-header">
                <span class="modal-title"></span>
                <button class="modal-close">X</button>
            </div>
            <div class="modal-body">
                <div class="modal-row">
                    <label class="modal-label">Name <input name="name" class="modal-input" type="text"></label>
                    <label class="modal-label">Sensor <select name="sid" class="modal-input" data-prefill="sensorOptions"></select></label>
                    <label class="modal-label" data-mode="edit">Status<select name="status" class="modal-input" data-prefill="statusOptions"></select></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">State<select name="state" class="modal-input" data-prefill="stateOptions"></select></label>
                    <label class="modal-label">County <input name="county" class="modal-input" type="text"></label>
                    <label class="modal-label">Town <input name="town" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">River <input name="river" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Latitude <input name="latitude" class="modal-input" type="text"></label>
                    <label class="modal-label">Longitude <input name="longitude" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Road <input name="road" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Intersection <input name="intersection" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Distance <input name="dist_bottom" class="modal-input" type="text"></label>
                    <label class="modal-label">Elevation <input name="elevation" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Orientation <input name="orientation" class="modal-input" type="text"></label>
                    <label class="modal-label">Up/Down<select name="updown" class="modal-input" data-prefill="upDownOptions"></select></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Cooperator <input name="cooperator" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label" data-mode="edit">Public Note <textarea name="public_note" class="modal-input"></textarea></label>
                </div>
            </div>
            <div class="modal-actions">
                <!-- Existing buttons (visible when NOT confirming) -->
                <button class="btn reset-btn">Reset</button>
                <button class="btn submit-btn">Submit</button>

                <!-- Confirm buttons (visible only when confirming) -->
                <button class="btn cancel-btn">Cancel</button>
                <button class="btn approve-btn">Approve</button>
            </div>
        </div>
    </div>

    <div class="modal" id="sensor">
        <div class="modal-card">
            <div class="modal-header">
                <span class="modal-title"></span>
                <button class="modal-close">X</button>
            </div>
            <div class="modal-body">
                <div class="modal-row">
                    <label class="modal-label">Sensor ID <input name="sensor_id" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Firmware <input name="firmware_version" class="modal-input" type="text"></label>
                    <label class="modal-label" data-mode="create">Date <input name="creation_date" class="modal-input" type="datetime-local" data-prefill="datetimeNow"></label>
                </div>
                <div class="modal-row" data-mode="edit">
                    <label class="modal-label">Status <select name="status" class="modal-input" data-prefill="statusOptions"></select></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">IMEI <input name="imei" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Sampling Rate <input name="sampling_rate" class="modal-input" type="number"></label>
                </div>
            </div>
            <div class="modal-actions">
                <!-- Existing buttons (visible when NOT confirming) -->
                <button class="btn reset-btn">Reset</button>
                <button class="btn submit-btn">Submit</button>

                <!-- Confirm buttons (visible only when confirming) -->
                <button class="btn cancel-btn">Cancel</button>
                <button class="btn approve-btn">Approve</button>
            </div>
        </div>
    </div>

    <div class="modal" id="ticket">
        <div class="modal-card">
            <div class="modal-header">
                <span class="modal-title"></span>
                <button class="modal-close">X</button>
            </div>
            <div class="modal-body">
                <div class="modal-row">
                    <label class="modal-label">Bridge<input name="observatory" class="modal-input" type="text"></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Problem<textarea name="problem" class="modal-input"></textarea></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Assigned to <select name="assignee" class="modal-input" data-prefill="maintenanceCrew"></select></label>
                    <label class="modal-label">Status <select name="status" class="modal-input" data-mode="edit" data-prefill="ticketStatus"></select></label>
                </div>
                <div class="modal-row">
                    <label class="modal-label">Notes <input name="notes" class="modal-input" type="text"></label>
                </div>
            </div>
            <div class="modal-actions">
                <!-- Existing buttons (visible when NOT confirming) -->
                <button class="btn reset-btn">Reset</button>
                <button class="btn submit-btn">Submit</button>

                <!-- Confirm buttons (visible only when confirming) -->
                <button class="btn cancel-btn">Cancel</button>
                <button class="btn approve-btn">Approve</button>
            </div>
        </div>
    </div>

    <div class="modal" id="plotly-container">
        <div class="modal-card plotly-card">
            <div class="modal-header">
                <span class="modal-title">Observatory Data</span>
                <button class="modal-close">X</button>
            </div>
            <div class="modal-body plotly-body"></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
